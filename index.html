<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flavio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #1a0a1e;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Cormorant Garamond', serif;
  }

  .bg {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 30%, #3d1a4a 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 70%, #1a0d30 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 50% 50%, #2a0a22 0%, transparent 80%),
      #0d0612;
    animation: bgShift 12s ease-in-out infinite alternate;
  }

  @keyframes bgShift {
    0%   { filter: hue-rotate(0deg) brightness(1); }
    50%  { filter: hue-rotate(15deg) brightness(1.1); }
    100% { filter: hue-rotate(-10deg) brightness(0.95); }
  }

  /* Orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(70px);
    opacity: 0.2;
    animation: floatOrb linear infinite;
  }
  .orb-1 { width: 320px; height: 320px; background: #c45c8a; top: -60px; left: -80px; animation-duration: 18s; }
  .orb-2 { width: 220px; height: 220px; background: #7b3fa0; bottom: 8%; right: 4%; animation-duration: 22s; animation-delay: -6s; }
  .orb-3 { width: 160px; height: 160px; background: #e87ca0; top: 60%; left: 8%; animation-duration: 16s; animation-delay: -10s; }
  .orb-4 { width: 260px; height: 260px; background: #4a2060; top: 28%; right: 18%; animation-duration: 25s; animation-delay: -3s; }

  @keyframes floatOrb {
    0%   { transform: translate(0, 0) scale(1); }
    25%  { transform: translate(40px, -60px) scale(1.1); }
    50%  { transform: translate(-30px, 30px) scale(0.9); }
    75%  { transform: translate(60px, 50px) scale(1.05); }
    100% { transform: translate(0, 0) scale(1); }
  }

  /* Hearts layer */
  .hearts-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  /* Heart shape via CSS */
  .heart {
    position: absolute;
    width: var(--size);
    height: var(--size);
    opacity: 0;
    animation: floatHeart var(--dur) ease-in-out infinite var(--delay);
  }

  .heart::before,
  .heart::after {
    content: '';
    position: absolute;
    top: 0;
    width: 50%;
    height: 80%;
    background: var(--color);
    border-radius: 50% 50% 0 0;
    filter: blur(var(--blur));
  }

  .heart::before {
    left: 50%;
    transform-origin: 0 100%;
    transform: rotate(-45deg);
  }

  .heart::after {
    right: 50%;
    transform-origin: 100% 100%;
    transform: rotate(45deg);
  }

  @keyframes floatHeart {
    0%   { transform: translateY(110vh) translateX(0) rotate(var(--rot)) scale(0.6); opacity: 0; }
    10%  { opacity: var(--max-opacity); }
    85%  { opacity: calc(var(--max-opacity) * 0.4); }
    100% { transform: translateY(-15vh) translateX(calc(var(--drift) * 1px)) rotate(calc(var(--rot) + 20deg)) scale(0.9); opacity: 0; }
  }

  /* Stars */
  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.08; transform: scale(1); }
    50%       { opacity: 0.6; transform: scale(1.5); }
  }

  /* Main content */
  .center {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 2rem;
  }

  .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 1rem;
    letter-spacing: 0.5em;
    color: #c589b0;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeSlideUp 1.2s ease forwards 0.3s;
    margin-bottom: 1.2rem;
  }

  .name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(5rem, 14vw, 10rem);
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #f2c4de 0%, #e8a0c8 30%, #d472a8 60%, #b84f8a 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    opacity: 0;
    animation: revealName 1.8s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.8s;
    filter: drop-shadow(0 0 40px rgba(210, 90, 160, 0.4));
    position: relative;
  }

  .name::after {
    content: 'Flavio';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #f2c4de, #d472a8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: blur(22px);
    opacity: 0.5;
    animation: glowPulse 4s ease-in-out infinite 2.6s;
  }

  @keyframes glowPulse {
    0%, 100% { opacity: 0.3; filter: blur(20px); }
    50%       { opacity: 0.7; filter: blur(32px); }
  }

  @keyframes revealName {
    0%   { opacity: 0; transform: translateY(30px) scale(0.95); letter-spacing: 0.1em; }
    100% { opacity: 1; transform: translateY(0) scale(1); letter-spacing: -0.02em; }
  }

  .deco-line {
    width: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, #d472a8, transparent);
    margin: 1.2rem auto;
    animation: expandLine 1.5s ease forwards 1.3s;
  }
  @keyframes expandLine {
    to { width: 180px; }
  }

  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.15rem;
    font-weight: 300;
    color: #9a6b88;
    letter-spacing: 0.2em;
    opacity: 0;
    animation: fadeSlideUp 1.2s ease forwards 1.6s;
    margin-top: 1.5rem;
  }

  @keyframes fadeSlideUp {
    0%   { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="bg"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="orb orb-4"></div>

<div class="hearts-layer" id="hearts"></div>

<div class="center">
  <p class="subtitle">pour toi</p>
  <h1 class="name">Flavio</h1>
  <div class="deco-line"></div>
  <p class="tagline">avec tout l'amour du monde</p>
</div>

<script>
  const heartsLayer = document.getElementById('hearts');

  const palette = [
    '#e87ca0',
    '#d45c8a',
    '#c490bb',
    '#a855a0',
    '#f5b8d5',
    '#bd4a7a',
    '#9b4d7a',
  ];

  // Blurry floating hearts
  for (let i = 0; i < 30; i++) {
    const h = document.createElement('div');
    h.className = 'heart';

    const size   = 30 + Math.random() * 130;
    const blur   = 8 + Math.random() * 22;
    const color  = palette[Math.floor(Math.random() * palette.length)];
    const dur    = 12 + Math.random() * 18;
    const delay  = -(Math.random() * dur);
    const drift  = (Math.random() - 0.5) * 180;
    const rot    = (Math.random() - 0.5) * 30;
    const maxOp  = 0.12 + Math.random() * 0.25;

    h.style.cssText = `
      --size: ${size}px;
      --blur: ${blur}px;
      --color: ${color};
      --dur: ${dur}s;
      --delay: ${delay}s;
      --drift: ${drift};
      --rot: ${rot}deg;
      --max-opacity: ${maxOp};
      left: ${Math.random() * 100}%;
      bottom: -${size}px;
    `;
    heartsLayer.appendChild(h);
  }

  // Stars
  for (let i = 0; i < 70; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      animation-duration:${2+Math.random()*4}s;
      animation-delay:${-Math.random()*5}s;
    `;
    heartsLayer.appendChild(s);
  }
</script>
</body>
</html>
